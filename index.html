const chartColors = ['#f44336', '#2196F3', '#FF9800', '#4CAF50', '#9C27B0', '#00BCD4', '#E91E63', '#8BC34A', '#FFC107', '#3F51B5', '#009688', '#673AB7'];

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {

			layer.on('popupopen', function(e) {

			layer.bindPopup(content, { maxHeight: 400 });

      function pop__2(feature, layer) {
    const gov = feature.properties['gov'] || 'غير معروف';

    const popupContent = `

}

       function style__2_0() {
            return {
                pane: 'pane__2',

                return L.circleMarker(latlng, style__2_0(feature));

            labels.push(layer);

              layer.added = true;

        });
       let chartInstance = null;

 function renderChart(selectedGov = null) {
      const ctx = document.getElementById('myChart').getContext('2d');
      const counts = {};
      layer__2.eachLayer(layer => {
        const gov = layer.feature.properties.gov;
        if (gov) counts[gov] = (counts[gov] || 0) + 1;
      });

     
      const labels = Object.keys(counts).sort();
      const originalData = labels.map(label => counts[label]);
      const backgroundColors = labels.map((_, i) => chartColors[i % chartColors.length]);
      const displayedData = selectedGov
        ? labels.map(label => label === selectedGov ? counts[label] : 0)
        : originalData;

      if (chartInstance) chartInstance.destroy();
chartInstance = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      label: '',
      data: displayedData,
      backgroundColor: backgroundColors,
      barThickness: 20,
      categoryPercentage: 2.0,
      barPercentage: 2.0
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: context => `عدد مكاتب الحجر الزراعى: ${context.raw}`,
          title: function(tooltipItem) {
            return 'العدد في ' + tooltipItem[0].label;
          }
        },
        bodyFont: {
          size: 16, // تغيير حجم الخط في الـ tooltip
          family: 'Arial', // تغيير نوع الخط
        },
        titleFont: {
          size: 18, // تغيير حجم الخط في العنوان
          weight: 'bold',
        }
      },
      datalabels: {
        display: true, // لعرض الأرقام داخل الأعمدة
        align: 'end', // محاذاة الأرقام في نهاية الأعمدة
        color: '#fff', // لون النص
        font: {
          size: 16, // حجم الخط داخل الأعمدة
          weight: 'bold', // جعل الخط عريض
        },
        formatter: function(value) {
          return value; // عرض الرقم الموجود في العمود
        }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        title: { 
          display: false, 
          text: 'عدد مكاتب الحجر الزراعى',
          font: {
            size: 18, // تغيير حجم الخط للمحور X
            weight: 'bold'
          }
        },
        ticks: {
          font: {
            size: 16, // زيادة حجم الخط في المحور X
          },
          padding: 10 // زيادة المسافة بين النصوص
        }
      },
      y: {
        title: { 
          display: true, 
          text: 'المحافظة',
          font: {
            size: 18, // تغيير حجم الخط للمحور Y
            weight: 'bold'
          }

          font: {
            size: 16, // زيادة حجم الخط في المحور Y
          },
          padding: 10 // زيادة المسافة بين النصوص
        }
      }
    }
  },
  plugins: [ChartDataLabels]
});


    }

  window.onload = function () {
  const dropdown = document.getElementById("governorateDropdown");
  const infoBox = document.getElementById("infoBox");
  const namesBox = document.getElementById("namesBox");

  const governoratesSet = new Set();
  layer__2.eachLayer(layer => {
    const govName = layer.feature.properties.gov;
    if (govName) governoratesSet.add(govName);
  });

  Array.from(governoratesSet).sort().forEach(govName => {
    const option = document.createElement("option");
    option.value = govName;
    option.textContent = govName;
    dropdown.appendChild(option);
  });

  dropdown.addEventListener("change", function () {
  const selectedGov = this.value;
  cluster__2.clearLayers(); // تنظيف الكلاستر

  const filteredLayers = [];

  layer__2.eachLayer(function (layerFeature) {
    const layerGov = layerFeature.feature.properties.gov;
    if (!selectedGov || layerGov === selectedGov) {
      filteredLayers.push(layerFeature);
    }
  });

  cluster__2.addLayers(filteredLayers);

  if (filteredLayers.length > 0) {
    const groupBounds = L.featureGroup(filteredLayers).getBounds();
    map.fitBounds(groupBounds.pad(0.5));
  } else {
    map.fitBounds([[28.7, 28.1], [32.4, 34.05]]);
  }

  if (!selectedGov) {
    const total = layer__2.getLayers().length;
    infoBox.innerHTML = "إجمالي عدد مكاتب الحجر الزراعى: <b>" + total + "</b>";

    // **هذا هو التعديل المطلوب**
    let listHTML = "<ul>";
    layer__2.eachLayer((layerFeature, index) => {
      const name = layerFeature.feature.properties.name || "غير معروف";
      listHTML += `<li data-name="${name}">${name}</li>`;

    });
    listHTML += "</ul>";
    namesBox.innerHTML = listHTML;

  } else {
    infoBox.innerHTML = "عدد مكاتب الحجر الزراعى  في محافظة <b>" + selectedGov + "</b>: " + filteredLayers.length;

    let listHTML = "<ul>";
   filteredLayers.forEach(layerFeature => {
  const name = layerFeature.feature.properties.name || "غير معروف";
  listHTML += `<li data-name="${name}">${name}</li>`;

});

    listHTML += "</ul>";
    namesBox.innerHTML = listHTML;
  }

  renderChart(selectedGov);
});

namesBox.addEventListener("click", function (e) {
  if (e.target.tagName === 'LI') {
    const clickedName = e.target.getAttribute('data-name');
    const selectedGov = dropdown.value; // قيمة المحافظة المختارة

    if (clickedName) {
      let targetLayer = null;

      layer__2.eachLayer(layer => {
        const layerName = layer.feature.properties.name;
        const layerGov = layer.feature.properties.gov;

        // إذا المحافظة مختارة (ليست فارغة) نبحث في نفس المحافظة
        // وإذا فارغة، نبحث في كل الطبقات
        if (layerName === clickedName && 
            (selectedGov === '' || layerGov === selectedGov)) {
          targetLayer = layer;
        }
      });

      if (targetLayer) {
        map.setView(targetLayer.getLatLng(), 14);
        targetLayer.openPopup();
      } else {
        console.log("لم يتم العثور على المكتب المطلوب");
      }
    }
  }
});




  // عرض إجمالي عدد مكاتب الحجر الزراعى في البداية

const total = layer__2.getLayers().length;
infoBox.innerHTML = "إجمالي عدد مكاتب الحجر الزراعى: <b>" + total + "</b>";

// عرض جميع أسماء مكاتب الحجر الزراعى عند تحميل الصفحة
let listHTML = "<ul>";
layer__2.eachLayer((layerFeature, index) => {

 listHTML += `<li data-name="${name}">${name}</li>`;

});
listHTML += "</ul>";
namesBox.innerHTML = listHTML;

renderChart();

};
